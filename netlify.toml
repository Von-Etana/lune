# =============================================================================
# NETLIFY CONFIGURATION FOR LUNE
# =============================================================================
#
# IMPORTANT: Configure these environment variables in Netlify Dashboard
# Go to: Site settings → Environment variables
#
# Required Environment Variables:
# --------------------------------
# VITE_SUPABASE_URL        = (your Supabase project URL)
# VITE_SUPABASE_ANON_KEY   = (your Supabase anon key)
# VITE_API_URL             = (your backend API URL)
#
# Optional Environment Variables:
# --------------------------------
# VITE_GEMINI_API_KEY      = (your Gemini API key for AI features)
#
# After adding variables, trigger a redeploy:
# Deploys → Trigger deploy → Deploy site
# =============================================================================

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Skip secrets scanning for example files and documentation
  # These contain placeholder values, not real secrets
  SECRETS_SCAN_OMIT_PATHS = "env.example,backend/env.example,SETUP_GUIDE.md,DEPLOYMENT_GUIDE.md,CONFIGURATION_STATUS.md,README.md,backend/README.md,backend/API_DOCUMENTATION.md,render.yaml,setup.ps1,dist/**"
  # Client-side env vars (VITE_*) are designed to be public and bundled into the frontend
  SECRETS_SCAN_OMIT_KEYS = "PORT,NODE_ENV,PWR_CHAIN_RPC_URL,PWR_CHAIN_ID,ALLOWED_ORIGINS,RATE_LIMIT_WINDOW_MS,SUPABASE_URL,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_API_URL,GEMINI_API_KEY,VITE_GEMINI_API_KEY"

# SPA redirect for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

